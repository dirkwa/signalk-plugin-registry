name: Nightly Plugin Registry Scan

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Test scope'
        type: choice
        options:
          - changed_only
          - all_plugins
          - single_plugin
        default: changed_only
      plugin:
        description: 'Plugin npm name (single_plugin mode only)'
        required: false
      include_master:
        description: 'Also test against server master branch'
        type: boolean
        default: false
      max_jobs:
        description: 'Max parallel test jobs (default 50, max 256)'
        type: number
        default: 50

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Plan — reads registry, no secrets needed
  # ─────────────────────────────────────────────────────────────
  plan:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      runs: ${{ steps.plan.outputs.runs }}
      has_runs: ${{ steps.plan.outputs.has_runs }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: npm ci

      - name: Resolve server versions
        id: resolve
        run: npx ts-node scripts/resolve-server.ts >> $GITHUB_OUTPUT

      - name: Discover plugins
        run: npx ts-node scripts/discover-plugins.ts --out /tmp/plugins.json

      - name: Plan runs
        id: plan
        env:
          MAX_MATRIX_JOBS: ${{ github.event.inputs.max_jobs || '50' }}
        run: |
          npx ts-node scripts/plan-runs.ts \
            --plugins-file /tmp/plugins.json \
            --stable-version '${{ steps.resolve.outputs.stable_version }}' \
            --master-sha '${{ steps.resolve.outputs.master_sha }}' \
            --mode '${{ github.event.inputs.mode || 'changed_only' }}' \
            --plugin-filter '${{ github.event.inputs.plugin }}' \
            --include-master '${{ github.event.inputs.include_master || 'false' }}' \
            --is-scheduled '${{ github.event_name == 'schedule' }}' \
            >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Test — runs UNTRUSTED plugin code, NO secrets, NO token
  # ─────────────────────────────────────────────────────────────
  test:
    needs: plan
    if: needs.plan.outputs.has_runs == 'true'
    permissions: {}
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        run: ${{ fromJson(needs.plan.outputs.runs) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: ${{ matrix.run.plugin }}@${{ matrix.run.pluginVersion }} x ${{ matrix.run.server }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install firejail
        run: sudo apt-get install -y -qq firejail

      - name: Setup server
        id: server
        uses: ./.github/actions/setup-server
        with:
          server-slot: ${{ matrix.run.server }}
          node-version: '24'

      - run: npm ci

      - name: Run plugin tests
        id: tests
        uses: ./.github/actions/run-plugin-tests
        with:
          plugin-name: ${{ matrix.run.plugin }}
          plugin-version: ${{ matrix.run.pluginVersion }}
          server-slot: ${{ matrix.run.server }}

      - name: Update results.json
        run: |
          npx ts-node scripts/update-results.ts \
            --plugin '${{ matrix.run.plugin }}' \
            --plugin-version '${{ matrix.run.pluginVersion }}' \
            --server-slot '${{ matrix.run.server }}' \
            --server-version '${{ steps.server.outputs.server-version }}' \
            --result-file /tmp/result.json \
            --reason '${{ matrix.run.reason }}'

      - name: Upload results artifact
        uses: actions/upload-artifact@v7
        with:
          name: result-${{ strategy.job-index }}
          path: results.json
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Merge — has write token, NEVER touches plugin code
  # ─────────────────────────────────────────────────────────────
  merge-results:
    needs: test
    if: always() && needs.test.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: npm ci

      - name: Download all result artifacts
        uses: actions/download-artifact@v8
        with:
          path: /tmp/results
          pattern: result-*

      - name: Merge and commit results
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin master
          git checkout origin/master -- results.json
          node -e "
            const fs = require('fs');
            const path = require('path');
            const base = JSON.parse(fs.readFileSync('results.json', 'utf-8'));
            const dir = '/tmp/results';
            let updated = 0;
            let rejected = 0;
            const VALID_BADGES = new Set([
              'compatible','loads','activates','has-providers','tested',
              'tests-failing','npm-audit-ok','audit-moderate','audit-high',
              'audit-critical','broken'
            ]);
            function validSlot(data) {
              if (!data || typeof data !== 'object') return false;
              if (typeof data.composite !== 'number' || data.composite < 0 || data.composite > 100) return false;
              if (!Array.isArray(data.badges) || !data.badges.every(b => VALID_BADGES.has(b))) return false;
              if (typeof data.tested !== 'string' || isNaN(Date.parse(data.tested))) return false;
              if (typeof data.installs !== 'boolean') return false;
              return true;
            }
            function mergeFile(f) {
              const partial = JSON.parse(fs.readFileSync(f, 'utf-8'));
              for (const [plugin, versions] of Object.entries(partial)) {
                if (!base[plugin]) base[plugin] = {};
                for (const [ver, slots] of Object.entries(versions)) {
                  if (!base[plugin][ver]) base[plugin][ver] = {};
                  for (const [slot, data] of Object.entries(slots)) {
                    if (!slot.startsWith('server@')) continue;
                    if (!validSlot(data)) {
                      console.log('Rejected invalid slot: ' + plugin + '/' + ver + '/' + slot);
                      rejected++;
                      continue;
                    }
                    const existing = base[plugin][ver][slot];
                    const newTs = data?.tested || '';
                    const oldTs = existing?.tested || '';
                    if (newTs > oldTs) {
                      base[plugin][ver][slot] = data;
                      updated++;
                    }
                  }
                }
              }
            }
            if (fs.existsSync(dir)) {
              const topLevel = path.join(dir, 'results.json');
              if (fs.existsSync(topLevel)) mergeFile(topLevel);
              for (const sub of fs.readdirSync(dir)) {
                const nested = path.join(dir, sub, 'results.json');
                if (fs.existsSync(nested)) mergeFile(nested);
              }
            }
            console.log('Updated ' + updated + ' plugin slots' + (rejected ? ', rejected ' + rejected + ' invalid' : ''));
            fs.writeFileSync('results.json', JSON.stringify(base, null, 2) + '\n');
          "
          git add results.json
          git diff --cached --quiet && echo 'No changes to commit' || {
            git commit -m "results: update from $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase origin master
            git push origin HEAD:master
          }

  # ─────────────────────────────────────────────────────────────
  # JOB 4: Publish — deploys to gh-pages, NEVER touches plugin code
  # ─────────────────────────────────────────────────────────────
  publish:
    needs: merge-results
    if: always() && needs.merge-results.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: npm ci

      - name: Build API
        run: npx ts-node scripts/build-api.ts

      - name: Deploy to gh-pages branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout --orphan gh-pages-tmp
          git rm -rf . 2>/dev/null || true
          cp -r api/* .
          git add -A
          git commit -m "api: update from $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          for i in 1 2 3; do
            git push origin gh-pages-tmp:gh-pages --force && break
            echo "Push attempt $i failed (concurrent update), retrying in ${i}s..."
            sleep "$i"
          done
