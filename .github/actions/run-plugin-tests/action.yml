name: Run Plugin Tests
description: Installs and tests a SignalK plugin through all tiers

inputs:
  plugin-name:
    required: true
  plugin-version:
    required: true
  server-slot:
    required: true
    default: stable

outputs:
  result-json:
    description: Full test result as JSON
    value: ${{ steps.run.outputs.result }}
  composite:
    description: Composite score 0-100
    value: ${{ steps.run.outputs.composite }}
  badges:
    description: Comma-separated badge list
    value: ${{ steps.run.outputs.badges }}

runs:
  using: composite
  steps:
    - name: Build harness
      shell: bash
      run: npx tsc
      working-directory: ${{ github.workspace }}

    - name: Run test harness
      id: run
      shell: bash
      run: |
        cd ${{ github.workspace }}
        node -e "
          process.on('uncaughtException', () => {});
          process.on('unhandledRejection', () => {});
          const { runPluginTest } = require('./dist/test-harness/runner');
          const write = (d) => require('fs').writeFileSync('/tmp/result.json', JSON.stringify(d));
          const fallback = (e) => write({
            installs: true, composite: 15, badges: ['compatible'],
            detection: { loads: false, activates: false, providers: [], unstubbedAccesses: [], loadError: e?.message || 'unknown' },
            auditCritical: 0, auditHigh: 0, auditModerate: 0,
            hasOwnTests: false, ownTestsPass: false, hasInstallScripts: false
          });
          runPluginTest(process.argv[1], process.argv[2])
            .then(r => { write(r); process.exit(0); })
            .catch(e => { fallback(e); process.exit(0); });
        " '${{ inputs.plugin-name }}' '${{ inputs.plugin-version }}' || true

        if [ ! -f /tmp/result.json ]; then
          echo '{"installs":false,"composite":0,"badges":["broken"],"detection":{"loads":false,"activates":false,"providers":[],"unstubbedAccesses":[]}}' > /tmp/result.json
        fi

        RESULT_JSON=$(cat /tmp/result.json)
        echo "result=${RESULT_JSON}" >> $GITHUB_OUTPUT

        COMPOSITE=$(node -e "const d=JSON.parse(require('fs').readFileSync('/tmp/result.json','utf8'));console.log(d.composite??0)")
        BADGES=$(node -e "const d=JSON.parse(require('fs').readFileSync('/tmp/result.json','utf8'));console.log((d.badges||[]).join(','))")

        echo "composite=$COMPOSITE" >> $GITHUB_OUTPUT
        echo "badges=$BADGES" >> $GITHUB_OUTPUT
